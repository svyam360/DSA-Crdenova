spring:
  application:
    name: dsa-lending-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/dsa_lending
    username: dsa_user
    password: dsa_pass

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: change-this-dev-secret-key-change-this-dev-secret-key
    expiration-ms: 86400000
